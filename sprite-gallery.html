<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030306;color:#ccc;font-family:'Segoe UI',system-ui,sans-serif}
.header{text-align:center;padding:30px 20px 15px}
.header h1{font-size:28px;color:#e0e0ff;letter-spacing:3px;font-family:monospace;
background:linear-gradient(90deg,#ff6622,#ff44ff,#44aaff,#ff6622);background-size:300% 100%;
-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 4s linear infinite}
@keyframes shine{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.header p{color:#555;font-size:13px;margin-top:4px}
.header a{color:#e94560;text-decoration:none}
.filters{max-width:1400px;margin:10px auto 20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 20px}
.filters button{font-family:monospace;font-size:12px;padding:7px 16px;border:1px solid #333;border-radius:6px;
background:#111;color:#aaa;cursor:pointer;transition:all .2s}
.filters button.active{background:#1a1a2e;color:#fff;border-color:#e94560}
.filters button:hover{border-color:#666}
.grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;padding:0 20px 40px}
.card{background:#0a0a14;border:1px solid #1a1a2e;border-radius:8px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:#e94560;box-shadow:0 0 20px rgba(233,69,96,.15)}
.card canvas{width:100%;aspect-ratio:1;display:block;background:#000}
.card .info{padding:8px 10px}
.card .name{font-family:monospace;font-size:12px;color:#e0e0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:10px;color:#555;font-family:monospace;margin-top:2px}
.card .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
.card .cat-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;color:#888;border:1px solid #222}
.card .source-tag{text-transform:uppercase;letter-spacing:0.08em}
.count{text-align:center;font-family:monospace;font-size:12px;color:#444;padding:10px;margin-bottom:10px}
</style>
</head>

const SOURCE_LABELS={all:"All",fxgen:"FXGEN Library",custom:"Custom GLSL",composite:"Composite Builds"};
const SOURCE_COLORS={fxgen:"#44aaff",custom:"#e94560",composite:"#ffaa22"};
const catColors={fire:"#e94560",ice:"#44aaff",magic:"#bb66ff",nature:"#44cc66",cosmic:"#aa88ff",energy:"#ffaa22",dark:"#666677",abstract:"#ff66aa"};
const cats=["all",...new Set(CATALOG.map(c=>c.cat))];

const sourceFiltersEl=document.getElementById("sourceFilters");
const filtersEl=document.getElementById("filters");
const gridEl=document.getElementById("grid");
const countEl=document.getElementById("count");
let activeCat="all";
let activeSource="all";

function sourceFor(file){
  const id=parseInt(file.split("-")[0],10);
  if(Number.isNaN(id))return"fxgen";
  if(id>=200)return"composite";
  if(id>=101)return"custom";
  return"fxgen";
}

const sourceCounts={fxgen:0,custom:0,composite:0};
CATALOG.forEach(item=>{
  item.source=sourceFor(item.file);
  if(sourceCounts[item.source]!=null)sourceCounts[item.source]+=1;
});

const params=new URLSearchParams(window.location.search);
const sourceParam=params.get("source");
if(sourceParam&&SOURCE_LABELS[sourceParam])activeSource=sourceParam;
const catParam=params.get("cat");
if(catParam&&cats.includes(catParam))activeCat=catParam;

["all","fxgen","custom","composite"].forEach(src=>{
  const b=document.createElement("button");
  const srcCount=src==="all"?CATALOG.length:sourceCounts[src];
  const label=SOURCE_LABELS[src]||src;
  b.textContent=`${label} (${srcCount})`;
  if(src===activeSource)b.classList.add("active");
  b.onclick=()=>{
    activeSource=src;
    sourceFiltersEl.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    renderGrid();
  };
  sourceFiltersEl.appendChild(b);
});

cats.forEach(c=>{
  const b=document.createElement("button");
  const catCount=c==="all"?CATALOG.length:CATALOG.filter(x=>x.cat===c).length;
  b.textContent=c==="all"?`All (${CATALOG.length})`:c.charAt(0).toUpperCase()+c.slice(1)+` (${catCount})`;
  if(c===activeCat)b.classList.add("active");
  b.onclick=()=>{
    activeCat=c;
    filtersEl.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    renderGrid();
  };
  filtersEl.appendChild(b);
});

const sprites=[];
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    const s=sprites.find(s=>s.card===e.target);
    if(s)s.visible=e.isIntersecting;
  });
},{threshold:0.1});

function renderGrid(){
  gridEl.innerHTML="";
  sprites.forEach(s=>{observer.unobserve(s.card);});
  sprites.length=0;
  const filtered=CATALOG.filter(item=>{
    if(activeSource!=="all"&&item.source!==activeSource)return false;
    if(activeCat!=="all"&&item.cat!==activeCat)return false;
    return true;
  });
  const sourceLabel=SOURCE_LABELS[activeSource]||activeSource;
  const catLabel=activeCat==="all"?"All Categories":activeCat;
  countEl.textContent=`Showing ${filtered.length} of ${CATALOG.length} effects — ${sourceLabel} · ${catLabel}`;
  filtered.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";
    const cv=document.createElement("canvas");
    cv.width=192;cv.height=192;
    const info=document.createElement("div");
    info.className="info";
    const sourceLabel=SOURCE_LABELS[item.source]||item.source;
    const sourceColor=SOURCE_COLORS[item.source]||"#666";
    info.innerHTML=`<div class="name">${item.name}</div><div class="meta">${item.fps} fps &middot; 36 frames</div><div class="tag-row"><span class="cat-tag" style="border-color:${catColors[item.cat]||'#333'};color:${catColors[item.cat]||'#888'}">${item.cat}</span><span class="cat-tag source-tag" style="border-color:${sourceColor};color:${sourceColor}">${sourceLabel}</span></div>`;
    card.appendChild(cv);card.appendChild(info);gridEl.appendChild(card);

    const ctx=cv.getContext("2d");
    const img=new Image();
    img.src=`sprites/${item.file}.png`;
    const entry={card,ctx,img,fps:item.fps,frame:0,lastT:0,loaded:false,visible:false,srcCell:192};
    img.onload=()=>{entry.loaded=true;entry.srcCell=Math.round(img.naturalWidth/GRID);};
    sprites.push(entry);
    observer.observe(card);
  });
}

function animate(t){
  for(const s of sprites){
    if(!s.visible||!s.loaded)continue;
    const dt=t-s.lastT;
    if(dt<1000/s.fps)continue;
    s.lastT=t;
    const col=s.frame%GRID,row=Math.floor(s.frame/GRID);
    const c=s.srcCell;
    s.ctx.clearRect(0,0,192,192);
    s.ctx.drawImage(s.img,col*c,row*c,c,c,0,0,192,192);
    s.frame=(s.frame+1)%FRAMES;
  }
  requestAnimationFrame(animate);
}

renderGrid();
requestAnimationFrame(animate);
