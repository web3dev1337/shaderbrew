<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Generate Custom GLSL Sprites</title></head>
<body>
<div id="status">Loading...</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.174.0/build/three.module.min.js"}}
</script>
<script type="module">
import * as THREE from "three";

const SRES=192,GRID=6,FRAMES=GRID*GRID,SHEET=SRES*GRID;
const status=document.getElementById("status");

const cv=document.createElement("canvas");cv.width=SRES;cv.height=SRES;
const r3=new THREE.WebGLRenderer({canvas:cv,alpha:true,preserveDrawingBuffer:true});
r3.setSize(SRES,SRES,false);r3.autoClear=true;
function makeRT(){return new THREE.WebGLRenderTarget(SRES,SRES,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,type:THREE.UnsignedByteType});}

const ppV=`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.0,1.0);}`;

// Circle mask pass
const maskScene=new THREE.Scene(),maskCam=new THREE.Camera();
const maskMat=new THREE.ShaderMaterial({
uniforms:{tDiffuse:{value:null}},vertexShader:ppV,
fragmentShader:`uniform sampler2D tDiffuse;varying vec2 vUv;
void main(){vec4 c=texture2D(tDiffuse,vUv);float d=length(vUv-.5)*2.;
float mask=1.-smoothstep(.3,1.,d);
float lum=dot(c.rgb,vec3(.299,.587,.114));
float kill=smoothstep(.0,.04,lum);
float alpha=mask*kill;
gl_FragColor=vec4(c.rgb*alpha,alpha);}`,
depthTest:false,depthWrite:false});
maskScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),maskMat));

// ==================== NOISE LIBRARY ====================
const NOISE_LIB=`
vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-.85373472095314*r;}

float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);
  const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(
    i.z+vec4(0.,i1.z,i2.z,1.))
    +i.y+vec4(0.,i1.y,i2.y,1.))
    +i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;
  vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

float fbm(vec3 p,int oct){
  float v=0.,a=.5;
  for(int i=0;i<8;i++){
    if(i>=oct)break;
    v+=a*snoise(p);
    p*=2.03;
    a*=.48;
  }
  return v;
}

float fbm5(vec3 p){return fbm(p,5);}
float fbm7(vec3 p){return fbm(p,7);}

// Hash for cheap randomness
float hash(float n){return fract(sin(n)*43758.5453);}
float hash21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}

// Rotation matrix
mat2 rot2(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}
`;

// ==================== CUSTOM SHADERS ====================

const SHADERS = {};

// 1. RAYMARCHED VOLUMETRIC NEBULA
SHADERS.volumetric_nebula=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

float nebulaDensity(vec3 p, float t){
  vec3 q=p*1.2+vec3(t*0.08,t*0.05,-t*0.03);
  float n=fbm7(q);
  n+=0.5*fbm5(q*2.5+vec3(0,t*0.1,0));
  float sphere=1.-smoothstep(0.0,1.8,length(p));
  return max(n*sphere,0.);
}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  vec3 ro=vec3(0,0,-3.5);
  vec3 rd=normalize(vec3(p,1.8));
  vec3 col=vec3(0);
  float transmittance=1.0;
  float t=0.5;
  for(int i=0;i<80;i++){
    vec3 pos=ro+rd*t;
    float d=nebulaDensity(pos,time);
    if(d>0.01){
      float dt=0.07;
      vec3 emit=vec3(0.6+0.4*d,0.2+0.3*d,0.8)*d*2.5;
      col+=emit*transmittance*dt;
      transmittance*=exp(-d*3.0*dt);
      if(transmittance<0.01)break;
    }
    t+=0.07;
    if(t>5.0)break;
  }
  gl_FragColor=vec4(col,1);
}`;

// 2. BLACK HOLE WITH ACCRETION DISK
SHADERS.black_hole=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Gravitational lensing distortion
  float schwarzschild=0.15;
  float bendFactor=schwarzschild/(r*r+0.001);
  vec2 bent=p+normalize(p)*bendFactor;
  float bentR=length(bent);
  float bentA=atan(bent.y,bent.x);

  // Event horizon
  float horizon=smoothstep(0.12,0.14,r);

  // Accretion disk - thin torus
  float diskR=length(vec2(bentR-0.55,bent.y*3.0));
  float disk=exp(-diskR*diskR*15.0);

  // Disk rotation + turbulence
  float diskAngle=bentA+time*0.5+snoise(vec3(bentA*2.0,bentR*5.0,time*0.3))*0.3;
  float diskNoise=snoise(vec3(cos(diskAngle)*3.0,sin(diskAngle)*3.0,time*0.2));
  disk*=(0.7+0.3*diskNoise);

  // Disk color: hot inner (white/blue) to cool outer (red/orange)
  float temp=1.0-smoothstep(0.3,0.8,bentR);
  vec3 hotColor=vec3(0.9,0.95,1.0);
  vec3 warmColor=vec3(1.0,0.6,0.15);
  vec3 coolColor=vec3(0.8,0.15,0.05);
  vec3 diskCol=mix(coolColor,mix(warmColor,hotColor,temp),temp);

  // Photon ring (bright ring at ~1.5x schwarzschild)
  float photonRing=exp(-pow((r-0.2)*20.0,2.0))*0.6;

  // Star field background
  float stars=0.0;
  for(int i=0;i<3;i++){
    vec2 sp=bent*float(20+i*15);
    vec2 id=floor(sp);
    float h=hash21(id+float(i)*100.0);
    if(h>0.95){
      vec2 o=fract(sp)-0.5;
      stars+=exp(-dot(o,o)*50.0)*(h-0.95)*20.0;
    }
  }

  // Compose
  vec3 col=vec3(0);
  col+=diskCol*disk*3.0;
  col+=vec3(0.7,0.8,1.0)*photonRing;
  col+=vec3(0.8,0.85,1.0)*stars*0.3;
  col*=horizon; // Black inside event horizon

  // Glow around hole
  float glow=exp(-r*3.0)*0.15;
  col+=vec3(0.3,0.2,0.5)*glow;

  gl_FragColor=vec4(col,1);
}`;

// 3. SHOCKWAVE RING
SHADERS.shockwave=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Expanding ring
  float ringR=time*0.3;
  float ring=exp(-pow((r-ringR)*12.0,2.0));

  // Ring turbulence
  float turb=snoise(vec3(cos(a)*5.0,sin(a)*5.0,time*2.0))*0.05;
  float ring2=exp(-pow((r-ringR+turb)*10.0,2.0));

  // Secondary inner ring
  float ringR2=ringR*0.6;
  float inner=exp(-pow((r-ringR2)*8.0,2.0))*0.5;

  // Central flash (fades quickly)
  float flash=exp(-time*3.0)*exp(-r*r*8.0)*2.0;

  // Debris field behind ring
  float debris=0.0;
  if(r<ringR){
    float fade=smoothstep(ringR,ringR*0.2,r);
    debris=snoise(vec3(p*8.0,time*0.5))*fade*0.3;
    debris=max(debris,0.0)*exp(-time*0.5);
  }

  // Distortion halo
  float halo=exp(-pow((r-ringR)*5.0,2.0))*0.3;

  float v=ring*1.5+ring2+inner+flash+debris+halo;
  gl_FragColor=vec4(vec3(clamp(v,0.0,1.0)),1);
}`;

// 4. PLASMA CONTAINMENT SPHERE
SHADERS.plasma_sphere=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

float plasmaDensity(vec3 p,float t){
  vec3 q=p;
  q.xz*=rot2(t*0.3);
  q.yz*=rot2(t*0.2);
  float n=snoise(q*3.0+t*0.5)*0.5
    +snoise(q*6.0-t*0.8)*0.25
    +snoise(q*12.0+t*1.2)*0.125;
  return n;
}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  vec3 ro=vec3(0,0,-3.0);
  vec3 rd=normalize(vec3(p,1.5));

  // Ray-sphere intersection (sphere r=1.2)
  float b=dot(ro,rd);
  float c=dot(ro,ro)-1.44;
  float disc=b*b-c;

  vec3 col=vec3(0);
  if(disc>0.0){
    float t0=max(-b-sqrt(disc),0.0);
    float t1=-b+sqrt(disc);

    // March through sphere volume
    float transmit=1.0;
    for(int i=0;i<40;i++){
      float t=t0+float(i)/40.0*(t1-t0);
      vec3 pos=ro+rd*t;
      float r=length(pos);

      // Shell concentration (bright at edges)
      float shell=exp(-pow((r-1.0)*5.0,2.0));
      // Core
      float core=exp(-r*r*3.0);

      float d=plasmaDensity(pos,time);
      float density=(shell*0.7+core*0.3)*max(d+0.3,0.0);

      // Emission
      vec3 emit=vec3(0.3,0.5,1.0)*density*shell
        +vec3(1.0,0.8,0.3)*density*core*2.0
        +vec3(0.8,0.2,1.0)*density*0.5;
      col+=emit*transmit*0.08;
      transmit*=exp(-density*2.0*0.08);
    }

    // Fresnel rim on sphere edge
    vec3 hitN=normalize(ro+rd*t0);
    float fresnel=pow(1.0-abs(dot(rd,hitN)),3.0);
    col+=vec3(0.3,0.5,1.0)*fresnel*0.5;
  }

  // Outer glow
  float outerGlow=exp(-length(p)*2.0)*0.1;
  col+=vec3(0.2,0.3,0.8)*outerGlow;

  gl_FragColor=vec4(col,1);
}`;

// 5. FRACTAL JULIA SET MORPH
SHADERS.fractal_julia=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 z=(uv-0.5)*3.0;

  // Morphing Julia constant
  float t=time*0.15;
  vec2 c=vec2(
    0.355+0.1*sin(t*1.3)+0.05*cos(t*2.7),
    0.355+0.1*cos(t*1.7)+0.05*sin(t*2.1)
  );

  float iter=0.0;
  float maxIter=80.0;
  float escape=4.0;

  // Smooth iteration count
  for(float i=0.0;i<80.0;i++){
    if(dot(z,z)>escape){iter=i;break;}
    z=vec2(z.x*z.x-z.y*z.y,2.0*z.x*z.y)+c;
    iter=i;
  }

  if(dot(z,z)<=escape){
    gl_FragColor=vec4(0,0,0,1);
    return;
  }

  // Smooth coloring
  float sl=iter-log2(log2(dot(z,z)))+4.0;
  float t2=sl/maxIter;

  // Rich color palette
  vec3 col;
  col.r=0.5+0.5*sin(3.0+t2*6.28*2.0+time*0.3);
  col.g=0.5+0.5*sin(3.5+t2*6.28*2.0+time*0.2);
  col.b=0.5+0.5*sin(4.0+t2*6.28*2.0+time*0.4);
  col=pow(col,vec3(0.8))*1.2;

  gl_FragColor=vec4(col,1);
}`;

// 6. WARP TUNNEL / HYPERSPACE
SHADERS.warp_tunnel=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Tunnel coordinates
  float tunnel=1.0/(r+0.001);
  float twist=a+time*0.5+tunnel*0.3;

  // Streaking stars
  float stars=0.0;
  for(int i=0;i<4;i++){
    float fi=float(i);
    float scale=2.0+fi*3.0;
    vec2 sp=vec2(twist*scale,tunnel*scale-time*(3.0+fi));
    vec2 id=floor(sp);
    vec2 f=fract(sp)-0.5;
    float h=hash21(id+fi*77.0);
    if(h>0.85){
      // Elongated streaks
      float streak=exp(-f.x*f.x*30.0-f.y*f.y*2.0);
      stars+=streak*(h-0.85)*10.0;
    }
  }

  // Tunnel walls (noise rings)
  float walls=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    float z=tunnel*2.0-time*(2.0+fi*0.5)+fi*3.0;
    float n=snoise(vec3(cos(a)*2.0,sin(a)*2.0,z));
    float ring=exp(-pow(fract(z*0.5)*2.0-1.0,2.0)*3.0);
    walls+=n*ring*0.3/(r+0.3);
  }

  // Central bright core
  float core=exp(-r*r*8.0)*0.8;

  // Radial blur/speed lines
  float speed=exp(-r*1.5)*0.3;

  // SPLIT-COMPLEMENTARY: blue-violet (240) + yellow-orange (40) + red-orange (20)
  // Stars: cool blue-white. Walls: warm amber accent. Core: violet-white.
  float w=max(walls,0.0);
  vec3 starCol=vec3(0.65,0.75,1.0);  // desaturated blue-white
  vec3 wallCol=vec3(1.0,0.7,0.25);   // amber accent (split-comp warm)
  vec3 coreCol=vec3(0.8,0.7,1.0);    // violet-white
  vec3 col=starCol*stars+wallCol*w+coreCol*(core+speed*0.5);

  gl_FragColor=vec4(col,1);
}`;

// 6b. WARP INFERNO — ANALOGOUS WARM: red(0) → orange(30) → gold(50)
// Narrow hue range for intensity with value contrast for depth
SHADERS.warp_inferno=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  float tunnel=1.0/(r+0.001);
  float twist=a+time*0.8+tunnel*0.6;

  float stars=0.0;
  for(int i=0;i<5;i++){
    float fi=float(i);
    float scale=3.0+fi*4.0;
    vec2 sp=vec2(twist*scale,tunnel*scale-time*(4.0+fi*1.5));
    vec2 id=floor(sp);
    vec2 f=fract(sp)-0.5;
    float h=hash21(id+fi*91.0);
    if(h>0.82){
      float streak=exp(-f.x*f.x*20.0-f.y*f.y*1.5);
      stars+=streak*(h-0.82)*8.0;
    }
  }

  float walls=0.0;
  for(int i=0;i<4;i++){
    float fi=float(i);
    float z=tunnel*1.5-time*(3.0+fi*0.7)+fi*2.0;
    float n=snoise(vec3(cos(a)*3.0,sin(a)*3.0,z));
    float ring=exp(-pow(fract(z*0.4)*2.0-1.0,2.0)*2.5);
    walls+=max(n,0.0)*ring*0.4/(r+0.2);
  }

  float core=exp(-r*r*10.0)*0.5;

  // Analogous warm: streaks=gold, walls=orange, core=deep red-orange
  // Stars are hottest (gold-white), walls mid-heat (orange), core deep ember
  vec3 starCol=vec3(1.0,0.85,0.4);   // gold (high value)
  vec3 wallCol=vec3(0.95,0.45,0.08);  // burnt orange (mid value)
  vec3 coreCol=vec3(0.7,0.15,0.05);  // deep ember (low value, high sat)
  vec3 col=starCol*stars+wallCol*walls+coreCol*core;
  // Subtle cool shadow in dark areas for contrast
  col+=vec3(0.03,0.0,0.06)*exp(-r*1.5)*(1.0-min(stars+walls+core,1.0));

  gl_FragColor=vec4(col,1);
}`;

// 6c. WARP VOID — TRIADIC: violet(270) + teal(180-shifted) + muted gold(60)
// Dominated by violet, teal accents, gold only as rare spark highlights
SHADERS.warp_void=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  float tunnel=1.0/(r+0.001);
  float twist=a+time*0.2+tunnel*0.15;

  float stars=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    float scale=1.5+fi*2.0;
    vec2 sp=vec2(twist*scale,tunnel*scale-time*(1.0+fi*0.3));
    vec2 id=floor(sp);
    vec2 f=fract(sp)-0.5;
    float h=hash21(id+fi*53.0);
    if(h>0.9){
      float streak=exp(-f.x*f.x*40.0-f.y*f.y*3.0);
      stars+=streak*(h-0.9)*6.0;
    }
  }

  float tendrils=0.0;
  for(int i=0;i<5;i++){
    float fi=float(i);
    float z=tunnel*1.0-time*(0.5+fi*0.2)+fi*4.0;
    float n=snoise(vec3(cos(a+fi)*2.0,sin(a+fi)*2.0,z));
    tendrils+=max(n,0.0)*0.2/(r+0.4);
  }

  float core=exp(-r*r*5.0)*0.3;
  float voidRing=exp(-pow((r-0.15)*10.0,2.0))*0.4;

  // Triadic: dominant violet, teal accents on tendrils, muted gold on rare stars
  vec3 violetDeep=vec3(0.15,0.03,0.25); // dark violet (dominant)
  vec3 violetMid=vec3(0.35,0.12,0.55);  // mid violet
  vec3 tealAcc=vec3(0.08,0.3,0.35);     // desaturated teal (secondary)
  vec3 goldSpark=vec3(0.7,0.6,0.2);     // muted gold (tertiary, rare)
  vec3 col=violetDeep*core*2.0+violetMid*voidRing
    +tealAcc*tendrils*2.0+goldSpark*stars*0.6
    +violetMid*stars*0.3;

  gl_FragColor=vec4(col,1);
}`;

// 6d. WARP ELECTRIC — COMPLEMENTARY: cyan(185) + warm coral(5)
// Cyan dominates, coral appears only in arc highlights for maximum contrast
SHADERS.warp_electric=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  float tunnel=1.0/(r+0.001);
  float twist=a+time*1.0+tunnel*0.4;

  float stars=0.0;
  for(int i=0;i<6;i++){
    float fi=float(i);
    float scale=2.0+fi*2.5;
    vec2 sp=vec2(twist*scale,tunnel*scale-time*(6.0+fi*2.0));
    vec2 id=floor(sp);
    vec2 f=fract(sp)-0.5;
    float h=hash21(id+fi*37.0);
    if(h>0.78){
      float streak=exp(-f.x*f.x*50.0-f.y*f.y*1.0);
      stars+=streak*(h-0.78)*6.0;
    }
  }

  float arcs=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    float z=tunnel*2.0-time*(5.0+fi)+fi*2.5;
    float n=snoise(vec3(cos(a)*4.0+fi,sin(a)*4.0,z*2.0));
    float arc=exp(-pow(abs(n)-0.3,2.0)*80.0);
    arcs+=arc*0.3/(r+0.3);
  }

  float core=exp(-r*r*12.0)*0.6;

  // Complementary: cyan streaks/core + coral arc tips
  vec3 cyanDeep=vec3(0.05,0.4,0.5);    // deep cyan (shadow)
  vec3 cyanBright=vec3(0.4,0.95,1.0);  // bright cyan (midtone)
  vec3 cyanWhite=vec3(0.8,0.98,1.0);   // near-white cyan (highlight)
  vec3 coral=vec3(1.0,0.35,0.2);       // warm coral (complement, accent only)
  vec3 col=cyanBright*stars+cyanDeep*arcs*0.6+coral*arcs*0.5
    +cyanWhite*core;

  gl_FragColor=vec4(col,1);
}`;

// 6e. WARP RAINBOW — ANALOGOUS COOL shifting: teal(180) → blue(220) → violet(280)
// Smooth gradient, not a raw rainbow. Depth shifts hue through the range.
SHADERS.warp_rainbow=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

// HSV to RGB
vec3 hsv2rgb(vec3 c){
  vec4 K=vec4(1.,2./3.,1./3.,3.);
  vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
  return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  float tunnel=1.0/(r+0.001);
  float twist=a+time*0.6+tunnel*0.5;

  float stars=0.0;
  for(int i=0;i<5;i++){
    float fi=float(i);
    float scale=2.5+fi*3.0;
    vec2 sp=vec2(twist*scale,tunnel*scale-time*(3.5+fi));
    vec2 id=floor(sp);
    vec2 f=fract(sp)-0.5;
    float h=hash21(id+fi*61.0);
    if(h>0.83){
      float streak=exp(-f.x*f.x*35.0-f.y*f.y*1.5);
      stars+=streak*(h-0.83)*8.0;
    }
  }

  float walls=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    float z=tunnel*2.0-time*(2.5+fi*0.5)+fi*3.0;
    float n=snoise(vec3(cos(a)*2.5,sin(a)*2.5,z));
    float ring=exp(-pow(fract(z*0.5)*2.0-1.0,2.0)*3.0);
    walls+=max(n,0.0)*ring*0.3/(r+0.3);
  }

  float core=exp(-r*r*8.0)*0.5;
  float intensity=stars+walls+core;

  // Analogous cool sweep: hue 0.5(teal) → 0.6(blue) → 0.78(violet)
  // Depth drives hue, angle adds variation, time slowly rotates
  float hueBase=0.5;  // teal start
  float hueRange=0.28; // teal → violet span
  float depthHue=fract(tunnel*0.05+time*0.06);
  float angleVar=sin(a*2.0+time*0.3)*0.04;
  float hue=hueBase+depthHue*hueRange+angleVar;
  // Saturation decreases at high intensity (white-hot center)
  float sat=mix(0.8,0.15,clamp(core*2.0,0.0,1.0));
  // Value from intensity
  float val=clamp(intensity*1.2,0.0,1.0);
  vec3 col=hsv2rgb(vec3(hue,sat,val));

  gl_FragColor=vec4(col,1);
}`;

// 7. TORNADO VORTEX
SHADERS.tornado=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

float tornadoDensity(vec3 p,float t){
  // Funnel shape: narrow at top, wide at bottom
  float y=p.y;
  float funnelR=mix(0.1,0.8,smoothstep(-1.5,1.5,y));
  float r=length(p.xz);

  // Rotation increases toward center
  float twist=t*2.0+(1.0-r/(funnelR+0.01))*8.0;
  vec3 q=p;
  q.xz*=rot2(twist+y*3.0);

  float n=snoise(q*vec3(3,1.5,3)+vec3(0,t*0.5,0));
  n+=0.5*snoise(q*vec3(6,3,6)-vec3(0,t*0.8,0));

  float funnel=exp(-pow((r-funnelR*0.5)/funnelR,2.0)*4.0);
  float yMask=smoothstep(-1.8,1.8,y)*smoothstep(2.0,1.5,y);

  return max(n*funnel*yMask,0.0);
}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  vec3 ro=vec3(2.5,0.5,-2.5);
  vec3 target=vec3(0,0.3,0);
  vec3 fwd=normalize(target-ro);
  vec3 right=normalize(cross(fwd,vec3(0,1,0)));
  vec3 up=cross(right,fwd);
  vec3 rd=normalize(fwd+right*p.x+up*p.y);

  vec3 col=vec3(0);
  float transmit=1.0;
  float t=0.0;
  for(int i=0;i<60;i++){
    vec3 pos=ro+rd*t;
    float d=tornadoDensity(pos,time);
    if(d>0.01){
      vec3 emit=vec3(0.4+d*0.3,0.35+d*0.2,0.3)*d*1.5;
      col+=emit*transmit*0.1;
      transmit*=exp(-d*2.5*0.1);
      if(transmit<0.01)break;
    }
    t+=0.08;
    if(t>8.0)break;
  }

  // Ground dust
  float groundY=(-0.8-ro.y)/rd.y;
  if(groundY>0.0&&groundY<8.0){
    vec3 gp=ro+rd*groundY;
    float dust=snoise(vec3(gp.xz*2.0,time*0.3))*exp(-length(gp.xz)*0.5);
    col+=vec3(0.3,0.25,0.2)*max(dust,0.0)*transmit*0.5;
  }

  gl_FragColor=vec4(col,1);
}`;

// 8. BIOLUMINESCENT ORGANISM
SHADERS.bioluminescent=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Organic body shape (deformed circle)
  float bodyR=0.5+0.1*sin(a*3.0+time*0.5)+0.05*sin(a*5.0-time*0.7)
    +0.08*snoise(vec3(cos(a)*2.0,sin(a)*2.0,time*0.3));
  float body=smoothstep(bodyR+0.05,bodyR-0.1,r);

  // Internal structure (veins/organelles)
  float veins=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    float vn=snoise(vec3(p*4.0+fi*3.0,time*0.2+fi));
    veins+=exp(-abs(vn)*5.0)*0.4;
  }

  // Pulsing glow
  float pulse=0.7+0.3*sin(time*1.5+r*3.0);
  float pulse2=0.8+0.2*sin(time*2.3-a*2.0);

  // Nucleus
  float nucleus=exp(-length(p-vec2(0.05*sin(time),0.05*cos(time*0.7)))*15.0);

  // Tentacle-like extensions
  float tentacles=0.0;
  for(int i=0;i<5;i++){
    float fi=float(i);
    float ta=fi*1.2566+time*0.2;
    vec2 dir=vec2(cos(ta),sin(ta));
    float along=dot(p,dir);
    float perp=abs(dot(p,vec2(-dir.y,dir.x)));
    float tentacle=smoothstep(0.1,0.0,perp)*smoothstep(0.4,0.8,along)*smoothstep(1.2,0.9,along);
    float wave=0.02*sin(along*20.0+time*3.0+fi);
    tentacle*=smoothstep(0.08+wave,0.0,perp);
    tentacles+=tentacle*0.5;
  }

  // Bioluminescent color
  vec3 col=vec3(0);
  vec3 bioColor1=vec3(0.0,0.8,0.6);
  vec3 bioColor2=vec3(0.1,0.4,1.0);
  vec3 bioColor3=vec3(0.6,0.1,0.8);

  vec3 bodyCol=mix(bioColor1,bioColor2,r/bodyR);
  col+=bodyCol*body*pulse*0.6;
  col+=bioColor2*veins*body*0.4;
  col+=vec3(0.8,1.0,0.9)*nucleus*1.5;
  col+=mix(bioColor1,bioColor3,0.5)*tentacles*pulse2;

  // Outer glow
  float glow=exp(-(r-bodyR)*5.0)*body*0.3;
  col+=bioColor1*glow;

  gl_FragColor=vec4(col,1);
}`;

// 9. SINGULARITY COLLAPSE/IMPLOSION
SHADERS.singularity=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Collapse phase: stuff pulls inward over time
  float collapse=time*0.15;
  float distort=max(1.0-collapse,0.1);
  vec2 pulled=p*distort+p/max(r,0.01)*collapse*0.1;
  float pr=length(pulled);
  float pa=atan(pulled.y,pulled.x);

  // Infall streams (spiral arms being sucked in)
  float streams=0.0;
  for(int i=0;i<6;i++){
    float fi=float(i);
    float sa=fi*1.047+pa+log(max(pr,0.01))*2.0+time*0.5;
    float stream=exp(-pow(sin(sa)*pr*3.0,2.0));
    stream*=smoothstep(0.0,0.2,pr)*smoothstep(1.5,0.3,pr);
    streams+=stream;
  }

  // Central singularity (grows over time)
  float singR=collapse*0.2;
  float sing=smoothstep(singR+0.02,singR,r);

  // Energy release ring
  float ringR=singR+0.05+0.02*sin(time*5.0);
  float ring=exp(-pow((r-ringR)*30.0,2.0))*2.0;

  // Accretion turbulence
  float turb=snoise(vec3(pa*3.0,pr*5.0-time,time*0.5));

  // Gravitational lensing of background
  float lens=0.05/(r*r+0.01);
  vec2 lensed=p+normalize(p)*lens;
  float bg=snoise(vec3(lensed*4.0,time*0.1))*0.15;
  bg=max(bg,0.0)*smoothstep(singR+0.1,1.0,r);

  // Compose
  vec3 col=vec3(0);
  vec3 streamCol=vec3(0.8,0.4,0.1)+vec3(0.2,0.1,0.4)*turb;
  col+=streamCol*streams*0.8;
  col+=vec3(1.0,0.9,0.7)*ring;
  col+=vec3(0.2,0.15,0.3)*bg;
  col*=(1.0-sing); // Black at center

  // Hawking radiation glow
  float hawking=exp(-pow((r-singR-0.01)*50.0,2.0))*0.5;
  col+=vec3(0.3,0.4,1.0)*hawking;

  gl_FragColor=vec4(col,1);
}`;

// 10. AURORA BOREALIS
SHADERS.aurora=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;

  vec3 col=vec3(0);

  // Multiple curtain layers
  for(int i=0;i<5;i++){
    float fi=float(i);
    float depth=0.5+fi*0.2;

    // Curtain wave
    float wave=sin(p.x*3.0+fi*1.5+time*0.3+snoise(vec3(p.x*2.0,fi,time*0.2))*1.5);
    wave+=0.5*sin(p.x*7.0+fi*2.3-time*0.5);

    // Vertical structure
    float curtainY=wave*0.3+fi*0.15-0.2;
    float vert=smoothstep(curtainY-0.3,curtainY,p.y)*smoothstep(curtainY+0.6,curtainY+0.1,p.y);

    // Shimmer
    float shimmer=snoise(vec3(p.x*5.0,p.y*10.0+time*2.0,fi+time*0.3));
    vert*=(0.6+0.4*shimmer);

    // Vertical rays
    float rays=snoise(vec3(p.x*8.0,fi*3.0,time*0.5));
    rays=max(rays,0.0);
    float rayStr=exp(-abs(p.y-curtainY-0.15)*5.0)*rays*0.5;

    // Color varies with height and layer
    float h=smoothstep(curtainY-0.1,curtainY+0.5,p.y);
    vec3 green=vec3(0.1,0.9,0.3);
    vec3 teal=vec3(0.1,0.7,0.7);
    vec3 purple=vec3(0.5,0.1,0.8);
    vec3 red=vec3(0.8,0.15,0.2);

    vec3 curtainCol=mix(green,teal,h+fi*0.15);
    curtainCol=mix(curtainCol,purple,smoothstep(0.5,1.0,h));
    curtainCol=mix(curtainCol,red,smoothstep(0.8,1.0,h)*0.3);

    col+=curtainCol*(vert+rayStr)*0.4/depth;
  }

  // Star background
  float stars=0.0;
  vec2 sp=p*20.0;
  vec2 id=floor(sp);
  float h=hash21(id);
  if(h>0.92){
    vec2 o=fract(sp)-0.5;
    stars=exp(-dot(o,o)*80.0)*(h-0.92)*12.0;
  }
  col+=vec3(0.8,0.85,1.0)*stars*0.2;

  gl_FragColor=vec4(col,1);
}`;

// 11. COSMIC JELLYFISH
SHADERS.cosmic_jellyfish=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Bell shape (dome top)
  vec2 bellCenter=vec2(0,0.15);
  float bellR=length(p-bellCenter);
  float bellA=atan(p.y-bellCenter.y,p.x-bellCenter.x);

  // Pulsating bell
  float bellPulse=0.45+0.08*sin(time*1.5);
  float bellShape=smoothstep(bellPulse,bellPulse-0.15,bellR);
  bellShape*=smoothstep(-0.2,0.1,p.y-bellCenter.y+bellR*0.3);

  // Bell internal pattern
  float bellPattern=snoise(vec3(bellA*3.0,bellR*5.0,time*0.5));
  bellPattern=0.5+0.5*bellPattern;

  // Tentacles
  float tentacles=0.0;
  for(int i=0;i<8;i++){
    float fi=float(i);
    float tx=fi*0.08-0.28+0.02*sin(fi);

    // Wave motion
    float wave=sin(p.y*6.0-time*2.0+fi*0.8)*0.04*(0.5-p.y);
    float tentX=tx+wave;

    float dist=abs(p.x-tentX);
    float width=0.015+0.01*sin(p.y*10.0+time+fi);
    float tent=smoothstep(width,0.0,dist);
    tent*=smoothstep(-0.8,0.0,p.y)*smoothstep(0.1,-0.1,p.y);

    // Fade toward tips
    tent*=smoothstep(-0.8,-0.3,p.y);

    tentacles+=tent;
  }

  // Colors
  vec3 col=vec3(0);
  vec3 bellCol=mix(vec3(0.2,0.1,0.8),vec3(0.8,0.2,0.6),bellR/bellPulse);
  col+=bellCol*bellShape*(0.5+0.5*bellPattern);

  vec3 tentCol=mix(vec3(0.6,0.2,0.9),vec3(0.2,0.8,1.0),(-p.y+0.1)/0.9);
  col+=tentCol*tentacles*0.7;

  // Glow
  float glow=exp(-bellR*3.0)*0.2;
  col+=vec3(0.4,0.2,0.8)*glow;

  // Bioluminescent spots
  for(int i=0;i<6;i++){
    float fi=float(i);
    vec2 spotP=vec2(0.15*sin(fi*1.3+time*0.3),0.15*cos(fi*1.7+time*0.4)+0.15);
    float spot=exp(-length(p-spotP)*20.0)*bellShape;
    col+=vec3(0.3,0.9,1.0)*spot;
  }

  gl_FragColor=vec4(col,1);
}`;

// 12. DIVINE LIGHT / GOD RAYS
SHADERS.god_rays=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Central light source (soft, not blinding)
  float source=exp(-r*r*6.0)*0.8;

  // Volumetric rays
  float rays=0.0;
  for(int i=0;i<12;i++){
    float fi=float(i);
    float rayAngle=fi*0.5236+time*0.1;

    // Ray width varies
    float width=0.04+0.02*sin(fi*2.3+time);
    float rayA=mod(a-rayAngle+3.14159,6.28318)-3.14159;
    float ray=exp(-rayA*rayA/(width*width));

    // Ray fades with distance and has noise
    float rayNoise=snoise(vec3(r*3.0+fi,a*2.0,time*0.5+fi));
    ray*=exp(-r*1.5)*(0.6+0.4*rayNoise);

    // Cloud occlusion
    float cloud=snoise(vec3(cos(a+fi)*3.0,sin(a+fi)*3.0,time*0.2));
    ray*=smoothstep(-0.2,0.2,cloud);

    rays+=ray;
  }

  // Dust motes in the light
  float dust=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    vec2 dp=p*float(10+i*5);
    vec2 did=floor(dp);
    float h=hash21(did+fi*50.0);
    if(h>0.9){
      vec2 o=fract(dp)-0.5;
      float mote=exp(-dot(o,o)*40.0);
      float drift=sin(time*0.5+h*6.28)*0.02;
      dust+=mote*(h-0.9)*5.0*exp(-r*2.0);
    }
  }

  // Halo ring
  float halo=exp(-pow((r-0.3)*8.0,2.0))*0.3;

  // Golden-white color (balanced, not blown out)
  vec3 col=vec3(1.0,0.95,0.8)*source;
  col+=vec3(1.0,0.9,0.7)*rays*0.4;
  col+=vec3(1.0,0.95,0.85)*dust*0.2;
  col+=vec3(1.0,0.85,0.6)*halo*0.7;

  gl_FragColor=vec4(col,1);
}`;

// 13. REALITY GLITCH / DIGITAL CORRUPTION
SHADERS.reality_glitch=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;

  // Glitch displacement
  float glitchT=floor(time*8.0)/8.0;
  float glitchStrength=pow(sin(time*1.5)*0.5+0.5,3.0);

  float band=floor(uv.y*20.0)/20.0;
  float bandNoise=hash(band+glitchT*7.3);
  float displacement=(bandNoise-0.5)*0.3*glitchStrength;

  vec2 gp=uv+vec2(displacement,0);

  // RGB split
  float split=0.02*glitchStrength;

  // Base pattern: digital grid
  vec2 grid=fract(gp*16.0);
  float gridLine=smoothstep(0.02,0.0,min(grid.x,grid.y));

  // Scan lines
  float scan=0.5+0.5*sin(gp.y*200.0+time*30.0);

  // Data corruption blocks
  float blocks=0.0;
  for(int i=0;i<4;i++){
    float fi=float(i);
    float bt=floor(time*4.0+fi*0.25)/4.0;
    vec2 blockPos=vec2(hash(bt+fi*3.1),hash(bt+fi*7.3+1.0));
    vec2 blockSize=vec2(0.1+0.1*hash(bt+fi*2.0),0.05+0.05*hash(bt+fi*4.0));
    vec2 d=abs(gp-blockPos)/blockSize;
    if(d.x<1.0&&d.y<1.0)blocks+=0.5;
  }

  // Static noise
  float staticN=hash21(floor(gp*resolution)+time*100.0);
  staticN=mix(0.0,staticN,glitchStrength*0.5);

  // Compose with RGB separation
  vec3 col;
  vec2 rUV=gp+vec2(split,0);
  vec2 bUV=gp-vec2(split,0);

  float patternR=gridLine+blocks+staticN;
  float patternG=gridLine+blocks+staticN;
  float patternB=gridLine+blocks+staticN;

  // Matrix-style rain
  float rain=0.0;
  for(int i=0;i<8;i++){
    float fi=float(i);
    float rx=floor(gp.x*30.0+fi*3.7)/30.0;
    float ry=fract(gp.y-time*(0.5+hash(rx+fi)*0.5)+hash(rx)*10.0);
    float trail=smoothstep(0.3,0.0,ry)*smoothstep(0.0,0.02,abs(gp.x-rx-0.017));
    rain+=trail*0.3;
  }

  col.r=patternR*0.3+rain*0.2+displacement*2.0;
  col.g=patternG*0.5+rain*1.0;
  col.b=patternB*0.3+rain*0.3+displacement*2.0;
  col*=0.7+0.3*scan;

  // Bright center
  float center=exp(-length(p)*2.0)*0.3;
  col+=vec3(0.1,0.8,0.3)*center;

  gl_FragColor=vec4(col,1);
}`;

// 14. CRYSTALLINE GEODE
SHADERS.crystal_geode=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Outer rock shell
  float shellR=0.85+0.1*snoise(vec3(a*3.0,0,time*0.1));
  float shell=smoothstep(shellR-0.05,shellR,r);

  // Crystal facets (Voronoi-like)
  vec3 col=vec3(0);
  float minDist=10.0;
  vec3 closestCol=vec3(0);

  // Crystal points growing from shell inward
  for(int i=0;i<15;i++){
    float fi=float(i);
    float ca=fi*0.4189+0.3*sin(fi*1.3);
    float cr=0.7-fi*0.02+0.05*sin(fi*2.7+time*0.3);
    vec2 crystal=vec2(cos(ca),sin(ca))*cr;

    // Crystal tip grows inward
    float growDir=0.3+0.1*sin(fi*3.1+time*0.5);
    vec2 tip=crystal*(1.0-growDir);

    float d=length(p-tip);

    // Faceted distance (angular modulation)
    float facetA=atan(p.y-tip.y,p.x-tip.x);
    float facets=1.0+0.15*sin(facetA*6.0+fi);
    d*=facets;

    if(d<minDist){
      minDist=d;
      // Each crystal has different color
      float hue=fi*0.3+time*0.1;
      closestCol=0.5+0.5*vec3(sin(hue),sin(hue+2.1),sin(hue+4.2));
    }
  }

  // Crystal internal glow
  float crystalGlow=exp(-minDist*8.0);
  float facetEdge=smoothstep(0.02,0.0,abs(fract(minDist*20.0)-0.5)-0.45)*0.5;

  // Internal refraction sparkle
  float sparkle=snoise(vec3(p*20.0,time*2.0));
  sparkle=pow(max(sparkle,0.0),3.0)*2.0;

  // Geode interior (within shell)
  float interior=1.0-shell;
  col+=closestCol*crystalGlow*interior*1.5;
  col+=vec3(1)*facetEdge*interior*0.3;
  col+=closestCol*sparkle*interior*0.4;

  // Dark rock shell
  col+=vec3(0.1,0.08,0.06)*shell*0.5;

  // Ambient glow from crystals
  float ambientGlow=exp(-r*2.0)*interior*0.2;
  col+=vec3(0.5,0.3,0.8)*ambientGlow;

  gl_FragColor=vec4(col,1);
}`;

// 15. PHOENIX REBIRTH
SHADERS.phoenix=`

void main(){

// 20. SUPERNOVA — star death: expanding shell, neutron star remnant, light echo
// TETRADIC color: blue-white core + gold ejecta + magenta shockfront + teal afterglow
SHADERS.supernova=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  float phase=time*0.12; // slow evolution

  // Expanding ejecta shell
  float shellR=phase*0.6;
  float shellThick=0.08+0.04*sin(a*7.0+time);
  float shell=exp(-pow((r-shellR)/shellThick,2.0));
  float shellTurb=snoise(vec3(a*4.0,r*8.0-time,time*0.3));
  shell*=(0.6+0.5*shellTurb);

  // Filamentary ejecta (Rayleigh-Taylor fingers)
  float filaments=0.0;
  for(int i=0;i<8;i++){
    float fi=float(i);
    float fa=fi*0.7854+phase*0.3;
    float spread=shellR*(0.8+0.4*sin(fi*2.3+time*0.5));
    vec2 fp=vec2(cos(fa),sin(fa))*spread;
    float fd=length(p-fp);
    float finger=exp(-fd*fd*60.0);
    // Stretch radially
    float radial=dot(normalize(p-fp+0.001),normalize(fp));
    finger*=smoothstep(-0.3,0.5,radial);
    filaments+=finger;
  }

  // Neutron star remnant (tiny, intensely bright, pulsing)
  float pulsar=exp(-r*r*200.0)*(1.5+0.5*sin(time*15.0));

  // Light echo rings (expanding at speed of light)
  float echo1=exp(-pow((r-phase*0.8)*20.0,2.0))*0.3*smoothstep(0.3,1.0,phase);
  float echo2=exp(-pow((r-phase*0.5)*15.0,2.0))*0.2*smoothstep(0.6,1.5,phase);

  // Reverse shock (inward-moving)
  float revShock=exp(-pow((r-max(shellR-0.15,0.0))*25.0,2.0))*0.4;

  // Color composition — tetradic harmony
  vec3 col=vec3(0);
  col+=vec3(0.9,0.95,1.0)*pulsar;                    // blue-white core
  col+=vec3(1.0,0.75,0.2)*shell*1.5;                 // gold ejecta
  col+=vec3(0.9,0.2,0.6)*filaments*0.8;              // magenta fingers
  col+=vec3(0.2,0.7,0.8)*(echo1+echo2);              // teal echo
  col+=vec3(1.0,0.4,0.7)*revShock;                   // pink reverse shock

  // Radial streaks from explosion
  float streaks=pow(max(sin(a*20.0+snoise(vec3(a*5.0,r,time))*3.0),0.0),4.0);
  streaks*=exp(-r*3.0)*shell*0.5;
  col+=vec3(1.0,0.9,0.6)*streaks;

  gl_FragColor=vec4(col,1);
}`;

// 21. DIMENSIONAL PORTAL — swirling ring with reality distortion
// ANALOGOUS COOL: deep indigo → electric blue → cyan, warm orange sparks at edges
SHADERS.portal=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Portal ring geometry
  float ringR=0.55;
  float ringDist=abs(r-ringR);
  float ringWidth=0.12+0.03*sin(a*6.0+time*2.0);

  // Swirling energy in ring
  float swirl=0.0;
  for(int i=0;i<6;i++){
    float fi=float(i);
    float sa=a+time*(0.8+fi*0.2)+fi*1.047;
    float sr=r+0.02*sin(sa*3.0+fi);
    float sn=snoise(vec3(cos(sa)*3.0,sin(sa)*3.0,sr*5.0+time*0.5+fi));
    float band=exp(-pow((sr-ringR)/(ringWidth+fi*0.01),2.0));
    swirl+=sn*band*0.4;
  }

  // Interior void — reality distortion
  float interior=smoothstep(ringR-0.05,ringR-0.15,r);
  vec2 distP=p/max(r,0.001);
  float warp=snoise(vec3(distP*3.0+time*0.3,time*0.2));
  vec2 warped=p+distP*warp*0.15*interior;
  float voidPattern=fbm5(vec3(warped*4.0,time*0.4));
  voidPattern=abs(voidPattern)*interior;

  // Energy arcs jumping across ring
  float arcs=0.0;
  for(int i=0;i<4;i++){
    float fi=float(i);
    float arcA=fi*1.571+time*1.5+sin(time*0.7+fi)*0.5;
    vec2 arcP=vec2(cos(arcA),sin(arcA))*ringR;
    float arcD=length(p-arcP);
    float arc=exp(-arcD*arcD*80.0)*(0.5+0.5*sin(time*8.0+fi*2.0));
    arcs+=arc;
  }

  // Particle spray from ring
  float particles=0.0;
  for(int i=0;i<12;i++){
    float fi=float(i);
    float pa=fi*0.524+time*0.3;
    float pr=ringR+0.1+0.15*hash(fi+floor(time*2.0));
    vec2 pp=vec2(cos(pa),sin(pa))*pr;
    float particle=exp(-length(p-pp)*30.0);
    particles+=particle*0.3;
  }

  // Color — analogous cool with warm accent
  vec3 col=vec3(0);
  float ringMask=exp(-ringDist*ringDist/(ringWidth*ringWidth));
  vec3 indigoDeep=vec3(0.15,0.05,0.4);
  vec3 electricBlue=vec3(0.2,0.4,1.0);
  vec3 cyanBright=vec3(0.3,0.85,1.0);
  vec3 orangeSpark=vec3(1.0,0.5,0.1);

  col+=electricBlue*ringMask*1.2;
  col+=cyanBright*max(swirl,0.0)*1.5;
  col+=indigoDeep*voidPattern*2.0;
  col+=cyanBright*arcs*2.0;
  col+=orangeSpark*particles;

  // Rim glow
  float rimGlow=exp(-ringDist*5.0)*0.3;
  col+=vec3(0.2,0.15,0.5)*rimGlow;

  // Inner void darkness with subtle pattern
  col=mix(col,indigoDeep*voidPattern*0.8,interior*0.5);

  gl_FragColor=vec4(col,1);
}`;

// 22. DEEP OCEAN — underwater caustics with volumetric light shafts
// MONOCHROMATIC blue with value variation + complementary amber sunbeams
SHADERS.deep_ocean=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;

  // Underwater caustics — overlapping wave interference
  float caustics=0.0;
  for(int i=0;i<4;i++){
    float fi=float(i);
    float scale=3.0+fi*2.0;
    float speed=0.3+fi*0.1;
    vec2 q=p*scale;
    q+=vec2(time*speed*0.7,time*speed);
    q+=0.5*vec2(sin(time*0.3+fi),cos(time*0.4+fi));

    // Two overlapping sine waves create caustic pattern
    float c1=sin(q.x+sin(q.y*1.3+time*speed))*0.5+0.5;
    float c2=sin(q.y*1.1+sin(q.x*0.9+time*speed*0.8))*0.5+0.5;
    float c=c1*c2;
    caustics+=pow(c,2.0)*0.4;
  }

  // Light shafts from above (volumetric crepuscular rays)
  float shafts=0.0;
  for(int i=0;i<6;i++){
    float fi=float(i);
    float sx=0.4*sin(fi*1.9+time*0.15)-p.x;
    float shaft=exp(-sx*sx*20.0);
    // Shaft wavers
    shaft*=0.5+0.5*sin(p.y*3.0+time*0.5+fi*1.3);
    // Fade with depth
    shaft*=smoothstep(-1.0,0.8,p.y);
    // Surface wave occlusion
    float occ=snoise(vec3(p.x*2.0+fi,p.y+time*0.3,fi));
    shaft*=smoothstep(-0.3,0.2,occ);
    shafts+=shaft*0.15;
  }

  // Floating particles (marine snow)
  float particles=0.0;
  for(int i=0;i<8;i++){
    float fi=float(i);
    vec2 pp=vec2(
      sin(fi*3.7+time*0.1)*0.8,
      fract(fi*0.31-time*0.05)*2.0-1.0
    );
    float pd=length(p-pp);
    particles+=exp(-pd*30.0)*0.2;
  }

  // Depth fog gradient
  float depth=smoothstep(1.0,-1.0,p.y);

  // Color — monochromatic blue + amber shafts (complement)
  vec3 deepBlue=vec3(0.02,0.05,0.15);
  vec3 midBlue=vec3(0.05,0.15,0.35);
  vec3 shallowBlue=vec3(0.1,0.3,0.5);
  vec3 causticCyan=vec3(0.15,0.5,0.6);
  vec3 shaftAmber=vec3(0.9,0.75,0.4);

  vec3 col=mix(shallowBlue,deepBlue,depth);
  col+=causticCyan*caustics*(1.0-depth*0.7);
  col+=shaftAmber*shafts;
  col+=vec3(0.2,0.3,0.4)*particles;

  gl_FragColor=vec4(col,1);
}`;

// 23. GALAXY SPIRAL — proper logarithmic spiral arms with star formation regions
// WARM-COOL split: blue-white young stars + amber core + magenta nebulae
SHADERS.galaxy=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Galaxy rotation (differential — inner faster)
  float rotation=time*0.1/(r+0.3);
  float ga=a+rotation;

  // Logarithmic spiral arms (2 main + 2 minor)
  float arms=0.0;
  for(int i=0;i<4;i++){
    float fi=float(i);
    float armOff=fi*1.5708; // 90 degrees apart
    float spiral=ga-log(max(r,0.001))*2.5+armOff;
    float arm=exp(-pow(sin(spiral)*r*3.0,2.0));
    // Arms are thinner in center, wider at edges
    arm*=smoothstep(0.05,0.2,r)*smoothstep(1.2,0.6,r);
    // Major arms are brighter
    float brightness=(i<2)?1.0:0.4;
    arms+=arm*brightness;
  }

  // Star field in arms (density follows arm structure)
  float stars=0.0;
  for(int i=0;i<5;i++){
    float fi=float(i);
    float scale=30.0+fi*20.0;
    vec2 sp=p*scale;
    sp+=vec2(rotation*scale*0.1); // rotate with galaxy
    vec2 id=floor(sp);
    vec2 f=fract(sp)-0.5;
    float h=hash21(id+fi*100.0);
    if(h>0.88){
      float star=exp(-dot(f,f)*(40.0+fi*20.0));
      // Brighter in arms
      float armDensity=arms;
      star*=(0.3+armDensity*2.0);
      stars+=star*(h-0.88)*8.0;
    }
  }

  // Galactic core — bright central bulge
  float core=exp(-r*r*12.0)*1.5;
  float coreDust=snoise(vec3(a*3.0,r*8.0,time*0.2));
  core*=(0.7+0.3*coreDust);

  // HII regions (star formation — bright pink knots in arms)
  float hii=0.0;
  for(int i=0;i<6;i++){
    float fi=float(i);
    float ha=fi*1.047+time*0.05+log(0.3+fi*0.1)*2.5;
    float hr=0.2+fi*0.1;
    vec2 hp=vec2(cos(ha),sin(ha))*hr;
    float h=exp(-length(p-hp)*20.0)*arms;
    hii+=h;
  }

  // Dust lanes (dark absorption along arms)
  float dust=snoise(vec3(p*5.0+time*0.05,time*0.1));
  float dustLane=smoothstep(0.1,0.4,dust)*arms*0.3;

  // Color composition
  vec3 col=vec3(0);
  vec3 coreAmber=vec3(1.0,0.8,0.4);
  vec3 armBlue=vec3(0.5,0.6,1.0);
  vec3 starWhite=vec3(0.9,0.92,1.0);
  vec3 hiiPink=vec3(0.9,0.2,0.5);

  col+=coreAmber*core;
  col+=armBlue*arms*0.4;
  col+=starWhite*stars;
  col+=hiiPink*hii*1.5;
  col*=(1.0-dustLane); // Dust absorption

  // Background glow
  col+=vec3(0.03,0.02,0.05)*smoothstep(1.5,0.0,r);

  gl_FragColor=vec4(col,1);
}`;

// 24. MANDELBROT DEEP ZOOM — smooth zooming into interesting region
// SPLIT-COMPLEMENTARY: deep violet + gold + teal
SHADERS.mandelbrot_zoom=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;

  // Target: Seahorse valley
  vec2 target=vec2(-0.743643887037151,0.131825904205330);

  // Zoom exponentially over time
  float zoom=pow(2.0,3.0+time*0.5);
  vec2 c=target+(uv-0.5)*2.0/zoom;

  vec2 z=vec2(0);
  float iter=0.0;
  float maxIter=150.0;

  for(float i=0.0;i<150.0;i++){
    if(dot(z,z)>256.0){iter=i;break;}
    z=vec2(z.x*z.x-z.y*z.y,2.0*z.x*z.y)+c;
    iter=i;
  }

  if(dot(z,z)<=256.0){
    gl_FragColor=vec4(0,0,0,1);
    return;
  }

  // Smooth iteration count (normalized)
  float sn=iter-log2(log2(dot(z,z)))+4.0;
  float t=sn/maxIter;

  // Split-complementary palette: violet + gold + teal
  // Using multiple sine waves at different phases
  float phase=t*6.28318*3.0+time*0.3;
  vec3 col;
  col.r=0.5+0.5*sin(phase+0.0);         // cycles through warm
  col.g=0.5+0.5*sin(phase+2.5);         // offset for variety
  col.b=0.5+0.5*sin(phase+4.2);         // offset for blue/violet

  // Darken very low iteration counts (border enhancement)
  col*=smoothstep(0.0,0.05,t);

  // Brighten high iteration areas (deep zoom detail)
  col*=1.0+smoothstep(0.3,0.8,t)*0.5;

  gl_FragColor=vec4(col,1);
}`;

// 25. CHAIN LIGHTNING — electric discharge network with branching
// COMPLEMENTARY: electric cyan + warm amber ground
SHADERS.chain_lightning=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

// Lightning bolt between two points using noise displacement
float bolt(vec2 p,vec2 a,vec2 b,float t,float seed){
  vec2 ab=b-a;
  float len=length(ab);
  vec2 dir=ab/len;
  vec2 perp=vec2(-dir.y,dir.x);

  float along=dot(p-a,dir)/len;
  float across=dot(p-a,perp);
  if(along<0.0||along>1.0)return 0.0;

  // Noise displacement perpendicular to bolt
  float disp=snoise(vec3(along*8.0+seed,t*5.0+seed*3.0,seed*7.0))*0.15*len;
  disp+=snoise(vec3(along*20.0+seed,t*8.0,seed*11.0))*0.05*len;

  float d=abs(across-disp);
  float width=0.01+0.005*sin(along*30.0+t*10.0);
  return exp(-d*d/(width*width))*smoothstep(0.0,0.1,along)*smoothstep(1.0,0.9,along);
}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;

  float lightning=0.0;
  float glow=0.0;

  // Main bolt — strikes from top to center
  float strikePhase=mod(time*0.4,1.0);
  float boltStr=smoothstep(0.0,0.05,strikePhase)*smoothstep(0.6,0.3,strikePhase);

  // Retrigger with different boltSeed each strike
  float boltSeed=floor(time*0.4)*7.13;

  vec2 origin=vec2(0.2*sin(boltSeed),-0.9);
  vec2 hitPos=vec2(0.1*sin(boltSeed*3.7),0.1*cos(boltSeed*2.3));

  // Main bolt
  float mainBolt=bolt(p,origin,hitPos,time,boltSeed)*boltStr;
  lightning+=mainBolt*2.0;

  // Branches
  for(int i=0;i<5;i++){
    float fi=float(i);
    float branchT=0.2+fi*0.15;
    vec2 branchStart=mix(origin,hitPos,branchT);
    float branchAngle=hash(boltSeed+fi*3.1)*3.14159-1.5708;
    vec2 branchEnd=branchStart+vec2(cos(branchAngle),sin(branchAngle))*0.3;
    float branch=bolt(p,branchStart,branchEnd,time,boltSeed+fi*5.0)*boltStr;
    lightning+=branch*0.8;

    // Sub-branches
    for(int j=0;j<2;j++){
      float fj=float(j);
      vec2 subStart=mix(branchStart,branchEnd,0.3+fj*0.3);
      float subAngle=branchAngle+hash(boltSeed+fi*7.0+fj*11.0)*1.0-0.5;
      vec2 subEnd=subStart+vec2(cos(subAngle),sin(subAngle))*0.15;
      lightning+=bolt(p,subStart,subEnd,time,boltSeed+fi*13.0+fj*17.0)*boltStr*0.4;
    }
  }

  // Secondary bolts (background, fainter)
  for(int i=0;i<3;i++){
    float fi=float(i);
    float s2=boltSeed+fi*23.0+100.0;
    float phase2=mod(time*0.4+fi*0.15,1.0);
    float act2=smoothstep(0.0,0.05,phase2)*smoothstep(0.5,0.2,phase2)*0.4;
    vec2 o2=vec2(hash(s2)*1.6-0.8,-0.9);
    vec2 t2=vec2(hash(s2+1.0)*0.8-0.4,hash(s2+2.0)*0.4-0.1);
    lightning+=bolt(p,o2,t2,time,s2)*act2;
  }

  // Ground glow at strike point
  float groundGlow=exp(-length(p-hitPos)*8.0)*boltStr*0.5;

  // Atmospheric light scatter
  float scatter=lightning*exp(-length(p-hitPos)*2.0)*0.3;

  // Color — cyan lightning + amber ground glow
  vec3 col=vec3(0);
  vec3 boltCyan=vec3(0.6,0.9,1.0);
  vec3 boltWhite=vec3(0.95,0.97,1.0);
  vec3 groundAmber=vec3(1.0,0.7,0.3);

  col+=mix(boltCyan,boltWhite,clamp(lightning,0.0,1.0))*lightning;
  col+=groundAmber*groundGlow;
  col+=vec3(0.15,0.2,0.35)*scatter;

  // Ambient dark sky
  col+=vec3(0.01,0.01,0.03);

  gl_FragColor=vec4(col,1);
}`;

// 26. SOLAR FLARE — coronal mass ejection from stellar surface
// ANALOGOUS WARM: deep red → orange → gold → white-yellow
SHADERS.solar_flare=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;
  float r=length(p);
  float a=atan(p.y,p.x);

  // Star surface (lower portion of frame)
  float surface=smoothstep(0.05,0.0,p.y+0.6+0.03*sin(p.x*10.0+time));
  float granules=snoise(vec3(p.x*15.0,time*0.5,p.y*5.0+time*0.3));
  granules=granules*0.5+0.5;

  // Main flare arc — magnetic loop
  float arcAngle=0.0+time*0.05;
  float arcHeight=0.6+0.1*sin(time*0.3);
  float arcWidth=0.4;

  // Parametric arc — semicircle
  vec2 arcCenter=vec2(0,-0.6);
  float arcR=length(p-arcCenter);
  float arcA=atan(p.y-arcCenter.y,p.x-arcCenter.x);
  float arcDist=abs(arcR-arcHeight);
  float arcMask=smoothstep(0.1,0.0,arcDist)*smoothstep(0.0,0.3,arcA)*smoothstep(3.14159,2.8,arcA);

  // Plasma flowing along arc
  float flow=snoise(vec3(arcA*5.0-time*3.0,arcR*3.0,time*0.5));
  flow=0.5+0.5*flow;
  float arcPlasma=arcMask*flow;

  // Secondary smaller loops
  float loops=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    vec2 lc=vec2(-0.3+fi*0.3,-0.6);
    float lr=length(p-lc);
    float la=atan(p.y-lc.y,p.x-lc.x);
    float loopH=0.25+0.05*sin(fi+time*0.5);
    float ld=abs(lr-loopH);
    float lm=smoothstep(0.04,0.0,ld)*smoothstep(0.2,0.5,la)*smoothstep(2.9,2.6,la);
    float lf=snoise(vec3(la*4.0-time*2.0+fi,lr*5.0,fi+time*0.3));
    loops+=lm*(0.5+0.5*lf)*0.5;
  }

  // Erupting plasma column (CME)
  float cmeX=p.x+0.05*snoise(vec3(p.y*5.0,time*2.0,0));
  float cme=exp(-cmeX*cmeX*30.0)*smoothstep(-0.5,0.0,p.y)*smoothstep(0.8,0.3,p.y);
  float cmeFlow=snoise(vec3(cmeX*3.0,p.y*4.0-time*3.0,time*0.5));
  cme*=(0.5+0.5*cmeFlow);

  // Coronal streamers
  float corona=0.0;
  for(int i=0;i<8;i++){
    float fi=float(i);
    float ca=fi*0.7854+time*0.05;
    vec2 cd=vec2(cos(ca),sin(ca));
    float along=max(dot(p-vec2(0,-0.6),cd),0.0);
    float perp=abs(dot(p-vec2(0,-0.6),vec2(-cd.y,cd.x)));
    float streamer=exp(-perp*perp*100.0)*exp(-along*2.0)*0.3;
    corona+=streamer;
  }
  corona*=smoothstep(-0.55,-0.4,p.y);

  // Color — analogous warm gradient
  vec3 col=vec3(0);
  vec3 deepRed=vec3(0.6,0.05,0.0);
  vec3 orange=vec3(1.0,0.5,0.05);
  vec3 gold=vec3(1.0,0.85,0.3);
  vec3 whiteHot=vec3(1.0,0.95,0.8);

  // Surface
  col+=mix(orange,gold,granules)*surface*0.8;

  // Flare plasma — hotter at base, cooler at top
  float flareHeat=smoothstep(0.5,-0.2,p.y);
  vec3 flareCol=mix(orange,whiteHot,flareHeat);
  col+=flareCol*(arcPlasma+loops)*1.5;
  col+=mix(gold,whiteHot,0.5)*cme*1.2;
  col+=deepRed*corona;

  // Chromosphere glow above surface
  float chromosphere=exp(-(p.y+0.55)*10.0)*smoothstep(-0.65,-0.55,p.y);
  col+=vec3(0.8,0.2,0.05)*chromosphere*0.3;

  gl_FragColor=vec4(col,1);
}`;

// 27. WHIRLPOOL — tightly spiraling water vortex with foam

${NOISE_LIB}

  water+=snoise(vec3(sp*6.0-time*0.3,time*0.6))*0.25;

  float spirals=0.0;
  for(int i=0;i<3;i++){
    float fi=float(i);
    float spiral=sa+fi*2.094;

  }

  for(int i=0;i<3;i++){
    float fi=float(i);

    float foamLine=exp(-pow(sin(fsa*2.0-log(max(r,0.01))*4.0)*r*5.0,2.0));
    foamLine*=smoothstep(0.1,0.3,r)*smoothstep(1.0,0.5,r);
    float foamNoise=snoise(vec3(sp*10.0+fi,time+fi));
    foam+=foamLine*(0.5+0.5*foamNoise)*0.3;
  }

  // Central vortex darkness (deep hole)
  float vortex=smoothstep(0.12,0.05,r);
  float vortexRim=exp(-pow((r-0.1)*20.0,2.0))*0.5;

  // Color — analogous cool
  vec3 navy=vec3(0.02,0.05,0.15);
  vec3 cerulean=vec3(0.05,0.2,0.45);
  vec3 seafoam=vec3(0.2,0.5,0.5);
  vec3 white=vec3(0.9,0.95,1.0);

  vec3 waterCol=mix(cerulean,navy,depth);
  waterCol+=seafoam*max(water*0.3,0.0);

// 28. DNA HELIX — double helix rotating in 3D with base pairs
// SPLIT-COMPLEMENTARY: cyan strands + magenta connections + gold phosphor glow
SHADERS.dna_helix=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;

  // DNA orientation: vertical helix
  float y=p.y;
  float phase=y*4.0+time*1.5;

  // Two helical strands
  float strand1x=sin(phase)*0.25;
  float strand2x=sin(phase+3.14159)*0.25;

  // Z-depth for occlusion (determines which strand is in front)
  float z1=cos(phase);
  float z2=cos(phase+3.14159);

  // Strand thickness
  float d1=length(vec2(p.x-strand1x,0))*8.0;
  float d2=length(vec2(p.x-strand2x,0))*8.0;
  float s1=exp(-d1*d1)*smoothstep(0.0,0.03,1.0/(d1+0.5));
  float s2=exp(-d2*d2)*smoothstep(0.0,0.03,1.0/(d2+0.5));

  // Base pair rungs connecting the strands
  float rungs=0.0;
  for(int i=-8;i<8;i++){
    float fi=float(i);
    float rungY=fi*0.15+fract(time*0.238)*0.15;
    if(abs(y-rungY)<0.03){
      float rungPhase=rungY*4.0+time*1.5;
      float rx1=sin(rungPhase)*0.25;
      float rx2=sin(rungPhase+3.14159)*0.25;
      float minX=min(rx1,rx2);
      float maxX=max(rx1,rx2);
      if(p.x>minX&&p.x<maxX){
        float rung=smoothstep(0.03,0.0,abs(y-rungY));
        // Rung has two halves meeting in middle
        float mid=(rx1+rx2)*0.5;
        float halfGap=smoothstep(0.01,0.02,abs(p.x-mid));
        rungs+=rung*halfGap*0.8;
      }
    }
  }

  // Z-ordering: dim the strand that's behind
  float bright1=mix(0.4,1.0,smoothstep(-1.0,1.0,z1));
  float bright2=mix(0.4,1.0,smoothstep(-1.0,1.0,z2));

  // Phosphor backbone glow
  float glow1=exp(-abs(p.x-strand1x)*8.0)*0.3;
  float glow2=exp(-abs(p.x-strand2x)*8.0)*0.3;

  // Color — split-complementary
  vec3 col=vec3(0);
  vec3 cyanStrand=vec3(0.2,0.8,1.0);
  vec3 tealStrand=vec3(0.1,0.9,0.7);
  vec3 magentaRung=vec3(0.9,0.2,0.6);
  vec3 goldGlow=vec3(1.0,0.85,0.3);

  col+=cyanStrand*s1*bright1;
  col+=tealStrand*s2*bright2;
  col+=magentaRung*rungs;
  col+=goldGlow*(glow1*bright1+glow2*bright2)*0.5;

  // Ambient scattered light
  float ambient=exp(-p.x*p.x*2.0)*0.05;
  col+=vec3(0.1,0.15,0.25)*ambient;

  gl_FragColor=vec4(col,1);
}`;

// 29. LAVA FLOW — viscous fluid dynamics with cooling crust
// ANALOGOUS WARM: black crust + deep red → orange cracks → yellow-white molten
SHADERS.lava_flow=`
uniform float time;
uniform vec2 resolution;
${NOISE_LIB}

void main(){
  vec2 uv=gl_FragCoord.xy/resolution;
  vec2 p=(uv-0.5)*2.0;

  // Slow advection (flow direction)
  vec2 flow=vec2(0.0,-0.3);
  vec2 q=p+flow*time*0.3;

  // Multi-octave domain warping for viscous fluid look
  vec2 warp1=vec2(
    fbm5(vec3(q*2.0,time*0.15)),
    fbm5(vec3(q*2.0+vec2(5.2,1.3),time*0.15))
  );
  vec2 warp2=vec2(
    fbm5(vec3((q+warp1*0.8)*2.0+vec2(1.7,9.2),time*0.12)),
    fbm5(vec3((q+warp1*0.8)*2.0+vec2(8.3,2.8),time*0.12))
  );

  // Final warped noise — this IS the lava pattern
  float n=fbm7(vec3((q+warp2*0.6)*3.0,time*0.1));

  // Crust formation — areas where lava has cooled
  // Higher noise = hotter (cracks), lower = crust
  float heat=smoothstep(-0.2,0.3,n);

  // Crust plates — Voronoi-like from noise derivatives
  float crust=smoothstep(0.4,0.0,heat);
  float crustEdge=smoothstep(0.15,0.2,heat)*smoothstep(0.35,0.25,heat);

  // Molten channels between plates (bright cracks)
  float cracks=smoothstep(0.0,0.05,heat)*smoothstep(0.3,0.15,heat);
  cracks*=1.5;

  // Hot spots — intensely bright pools
  float hotSpot=smoothstep(0.5,0.8,heat);

  // Ember particles floating above
  float embers=0.0;
  for(int i=0;i<6;i++){
    float fi=float(i);
    vec2 ep=vec2(
      sin(fi*4.1+time*0.2)*0.8,
      fract(fi*0.23+time*0.1)*2.0-1.0
    );
    float ember=exp(-length(p-ep)*25.0)*0.3;
    embers+=ember;
  }

  // Color — analogous warm with value contrast
  vec3 col=vec3(0);
  vec3 blackCrust=vec3(0.05,0.02,0.01);
  vec3 deepRed=vec3(0.4,0.02,0.0);
  vec3 orange=vec3(1.0,0.4,0.0);
  vec3 yellowHot=vec3(1.0,0.85,0.3);

  col=blackCrust*crust;
  col+=deepRed*crustEdge*2.0;
  col+=orange*cracks;
  col+=yellowHot*hotSpot*1.5;
  col+=orange*embers;

  // Subtle glow from cracks illuminating crust edges
  float crackGlow=heat*0.15;
  col+=deepRed*crackGlow;

  gl_FragColor=vec4(col,1);
}`;

    // Teeth

  float hourAngle=time*0.1;
  float hourD=abs(sin(a-hourAngle))*r;

  float minD=abs(sin(a-minAngle))*r;
  hands+=smoothstep(0.015,0.0,minD)*smoothstep(0.0,0.03,r)*smoothstep(0.45,0.4,r)*0.4;

  float secD=abs(sin(a-secAngle))*r;
  hands+=smoothstep(0.008,0.0,secD)*smoothstep(0.0,0.02,r)*smoothstep(0.5,0.45,r)*0.3;

  for(int i=0;i<5;i++){

    float riftD=abs(sin(a-riftA)*r*5.0-snoise(vec3(r*3.0+fi,a,time))*0.5);
