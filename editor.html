<!DOCTYPE html>
<html lang="en">
	<head>
		<title>EffectTextureMaker</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
		<style>
			* { box-sizing: border-box; }
			body {
				color: #fff;
				font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
				font-size: 13px;
				text-align: center;
				background-color: #050508;
				margin: 0;
				overflow: hidden;
			}
			canvas {
				display: block;
				position: absolute;
				top: 36px; left: 260px; right: 300px; bottom: 40px;
				margin: auto;
			}
			#info { display: none; }
			a { color: #e94560; }
			.lil-gui {
				position: fixed !important;
				top: 0 !important;
				right: 0 !important;
				bottom: 40px !important;
				width: 300px !important;
				max-height: none !important;
				overflow-y: auto !important;
				border-left: 1px solid #1f1f2f !important;
				--font-size: 13px;
				--input-font-size: 13px;
				--widget-height: 22px;
				--slider-knob-width: 3px;
				--background-color: rgba(8, 8, 16, 0.97);
				--title-background-color: #0c0c18;
				--folder-indent: 8px;
			}
			.lil-gui .title { font-size: 12px; }
			#time {
				position: fixed;
				bottom: 44px;
				right: 310px;
				font-family: 'Consolas', monospace;
				font-size: 11px;
				color: #444;
				z-index: 9996;
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div id="info">
			EffectTextureMaker - Powered by <a href="http://threejs.org" target="_blank">three.js (r174)</a>

		<script type="importmap">

				"imports": {
					"three": "https://unpkg.com/three@0.174.0/build/three.module.min.js",
					"three/addons/": "https://unpkg.com/three@0.174.0/examples/jsm/",
					"pixy": "./pixy.module.min.js"
				}
			}
		</script>
		<script type="module" src="src/app.js"></script>
		<script type="module" src="src/ui/top-nav.js"></script>
