<!DOCTYPE html>
<html lang="en">
	<head>
		<title>EffectTextureMaker</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
		<style>
			* { box-sizing: border-box; }
			body {
				color: #fff;
				font-family: Monospace;
				font-size: 13px;
				text-align: center;
				font-weight: bold;
				background-color: #000;
				margin: 0px;
				overflow: hidden;
			}
			canvas {
				display: block;
				position: absolute;
				top: 36px; left: 260px; right: 300px; bottom: 50px;
				margin: auto;
			}
			#info { display: none; }
			a { color: orange; }
			.lil-gui {
				position: fixed !important;
				top: 0 !important;
				right: 0 !important;
				bottom: 50px !important;
				width: 300px !important;
				max-height: none !important;
				overflow-y: auto !important;
				border-left: 1px solid #333 !important;
				--font-size: 13px;
				--input-font-size: 13px;
				--widget-height: 22px;
				--slider-knob-width: 3px;
				--background-color: rgba(10, 10, 20, 0.95);
				--title-background-color: #0f0f1a;
				--folder-indent: 8px;
			}
			.lil-gui .title { font-size: 12px; }
			#time {
				position: fixed;
				bottom: 55px;
				left: 50%;
				transform: translateX(-50%);
				font-family: consolas;
				font-size: 12px;
				color: #555;
				z-index: 9997;
			}
		</style>
	</head>
	<body>
		<div id="info">
			EffectTextureMaker - Powered by <a href="http://threejs.org" target="_blank">three.js (r174)</a>
		</div>
		<div id="time" style="font-family: consolas"></div>
		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.174.0/build/three.module.min.js",
					"three/addons/": "https://unpkg.com/three@0.174.0/examples/jsm/",
					"pixy": "./pixy.module.min.js"
				}
			}
		</script>
		<script type="module" src="src/app.js"></script>
	</body>
</html>
